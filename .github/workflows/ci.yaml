name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  test:
    name: Tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blsq/openhexa-blsq-environment:1.16.2
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov
